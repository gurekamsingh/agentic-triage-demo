<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 32px;
      color: #7c6af7;
      letter-spacing: 1px;
    }

    .container { max-width: 640px; margin: 0 auto; }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #7c6af7; }

    button {
      padding: 12px 20px;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    button:hover { background: #6a58e0; }

    .task-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }

    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 18px;
      transition: border-color 0.2s;
    }

    .task-item:hover { border-color: #444; }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: #666;
    }

    .task-title { font-size: 1rem; }
    .task-desc { font-size: 0.8rem; color: #777; margin-top: 4px; }

    .task-actions { display: flex; gap: 8px; }

    .btn-done {
      background: #2a9d5c;
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .btn-done:hover { background: #228a4d; }

    .btn-delete {
      background: #c0392b;
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .btn-delete:hover { background: #a93226; }

    .empty {
      text-align: center;
      color: #555;
      margin-top: 40px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>

    <div class="form-row">
      <input type="text" id="task-title" placeholder="Task title..." />
      <input type="text" id="task-desc" placeholder="Description (optional)" />
      <button onclick="createTask()">Add</button>
    </div>

    <ul class="task-list" id="task-list"></ul>
    <p class="empty" id="empty-msg" style="display:none">No tasks yet. Add one above.</p>
  </div>

  <script>
    async function loadTasks() {
      const res = await fetch('/tasks');
      const tasks = await res.json();
      render(tasks);
    }

    function render(tasks) {
      const list = document.getElementById('task-list');
      const empty = document.getElementById('empty-msg');
      list.innerHTML = '';

      if (tasks.length === 0) {
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      tasks.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.completed ? ' done' : '');
        li.innerHTML = `
          <div>
            <div class="task-title">${t.title}</div>
            ${t.description ? `<div class="task-desc">${t.description}</div>` : ''}
          </div>
          <div class="task-actions">
            ${!t.completed
              ? `<button class="btn-done" onclick="completeTask(${t.id})">Done</button>`
              : ''}
            <button class="btn-delete" onclick="deleteTask(${t.id})">Delete</button>
          </div>
        `;
        list.appendChild(li);
      });
    }

    async function createTask() {
      const title = document.getElementById('task-title').value.trim();
      const desc  = document.getElementById('task-desc').value.trim();
      if (!title) return;

      await fetch('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: desc })
      });

      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      loadTasks();
    }

    async function completeTask(id) {
      await fetch(`/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed: true })
      });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    loadTasks();
  </script>
</body>
</html>
